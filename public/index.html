<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronómetro — Segundo Cerebro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
    --border: #2a2a2a; --accent: #c8f135; --accent-dim: rgba(200,241,53,0.12);
    --text: #f0f0f0; --muted: #666; --mid: #999;
    --red: #ff4444; --red-dim: rgba(255,68,68,0.12);
    --green: #44ff88; --green-dim: rgba(68,255,136,0.1);
    --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif;
    --r: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 1.25rem; }
  .wordmark { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  h1 { font-size: 22px; font-weight: 500; line-height: 1.2; }
  h1 span { color: var(--accent); }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  input, select, textarea {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
    color: var(--text); font-family: var(--mono); font-size: 13px; padding: 12px 14px;
    width: 100%; outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: rgba(200,241,53,0.4); }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  select option { background: #1a1a1a; }
  textarea { resize: vertical; min-height: 68px; line-height: 1.5; font-family: var(--sans); }
  .hint { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .hint a { color: var(--accent); text-decoration: none; }

  .btn-primary { background: var(--accent); border: none; border-radius: var(--r); color: #0f0f0f; cursor: pointer; font-family: var(--sans); font-size: 14px; font-weight: 600; padding: 14px; width: 100%; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.3; cursor: default; }

  .btn-start { flex:1; background: var(--accent-dim); border: 1px solid rgba(200,241,53,0.3); border-radius: var(--r); color: var(--accent); cursor: pointer; font-family: var(--sans); font-size: 14px; font-weight: 500; padding: 14px; transition: background 0.15s; }
  .btn-start:hover { background: rgba(200,241,53,0.2); }
  .btn-start:disabled { opacity: 0.3; cursor: default; }

  .btn-stop { flex:1; background: var(--red-dim); border: 1px solid rgba(255,68,68,0.3); border-radius: var(--r); color: var(--red); cursor: pointer; font-family: var(--sans); font-size: 14px; font-weight: 500; padding: 14px; transition: background 0.15s; }
  .btn-stop:hover { background: rgba(255,68,68,0.2); }
  .btn-stop:disabled { opacity: 0.3; cursor: default; }

  .btn-save { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); color: var(--mid); cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 13px; width: 100%; transition: all 0.15s; }
  .btn-save:not(:disabled):hover { background: var(--green-dim); border-color: rgba(68,255,136,0.3); color: var(--green); }
  .btn-save:disabled { opacity: 0.3; cursor: default; }

  .btn-small { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 11px; font-family: var(--sans); padding: 5px 10px; transition: all 0.15s; }
  .btn-small:hover { border-color: var(--mid); color: var(--mid); }

  .status-row { display: flex; align-items: center; justify-content: space-between; }
  .status-label { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .dot.running { background: var(--red); animation: blink 1.2s infinite; }
  .dot.done { background: var(--green); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
  .project-card .plabel { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .project-card .pname { font-size: 15px; font-weight: 500; }

  .timer { font-family: var(--mono); font-size: 64px; font-weight: 400; letter-spacing: -1px; line-height: 1; padding: 4px 0; transition: color 0.3s; }
  .timer.running { color: var(--accent); }

  .acum-row { font-size: 13px; color: var(--muted); display: flex; gap: 8px; }
  .acum-row span { font-family: var(--mono); color: var(--mid); }

  .controls { display: flex; gap: 10px; }
  .divider { border: none; border-top: 1px solid var(--border); }

  .toast { border-radius: var(--r); font-size: 13px; padding: 12px 14px; display: none; line-height: 1.4; }
  .toast.success { background: var(--green-dim); border: 1px solid rgba(68,255,136,0.3); color: var(--green); }
  .toast.error { background: var(--red-dim); border: 1px solid rgba(255,68,68,0.3); color: var(--red); }

  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; gap: 1.25rem; }
</style>
</head>
<body>
<div class="app">

  <!-- SETUP -->
  <div class="screen active" id="screen-setup">
    <div>
      <p class="wordmark">Segundo Cerebro</p>
      <h1>Cronómetro de<br><span>proyectos</span></h1>
    </div>
    <div class="field">
      <label>Notion Integration Token</label>
      <input type="password" id="token" placeholder="secret_xxxxxxxxxxxx" />
      <p class="hint">Crea una integración en <a href="https://www.notion.so/profile/integrations" target="_blank">notion.so/profile/integrations</a> y pega el token aquí. Se guarda solo en tu navegador.</p>
    </div>
    <div class="field">
      <label>ID base de datos Proyectos</label>
      <input type="text" id="input-projects-db" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
      <p class="hint">Copia la URL de tu DB Proyectos en Notion — el ID son los 32 caracteres antes del <code style="color:var(--accent)">?v=</code></p>
    </div>
    <div class="field">
      <label>ID base de datos Time Tracking</label>
      <input type="text" id="input-timetrack-db" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
    </div>
    <div class="toast error" id="setup-error"></div>
    <button class="btn-primary" id="btn-connect" onclick="connect()">Conectar y cargar proyectos</button>
  </div>

  <!-- TIMER -->
  <div class="screen" id="screen-timer">
    <div class="status-row">
      <div class="status-label"><div class="dot" id="dot"></div><span id="status-txt">Listo</span></div>
      <button class="btn-small" onclick="goSetup()">Cambiar token</button>
    </div>
    <div class="field">
      <label>Proyecto</label>
      <select id="project-select" onchange="onProject()">
        <option value="">— Selecciona un proyecto —</option>
      </select>
    </div>
    <div class="project-card" id="project-card" style="display:none">
      <p class="plabel">Trabajando en</p>
      <p class="pname" id="project-name">—</p>
    </div>
    <div class="timer" id="timer">00:00:00</div>
    <div class="acum-row">Total acumulado: <span id="acum">0 min</span></div>
    <div class="controls">
      <button class="btn-start" id="btn-start" onclick="start()" disabled>▶ Iniciar</button>
      <button class="btn-stop" id="btn-stop" onclick="stop()" disabled>⏹ Detener</button>
    </div>
    <hr class="divider">
    <div class="field">
      <label>Notas (opcional)</label>
      <textarea id="notes" placeholder="¿En qué trabajaste?"></textarea>
    </div>
    <button class="btn-save" id="btn-save" onclick="save()" disabled>Guardar en Notion →</button>
    <div class="toast" id="toast"></div>
  </div>

</div>
<script>
let token = '', PROJECTS_DB = '', TIMETRACK_DB = '', projects = [], selected = null;
let interval = null, startTs = null, elapsed = 0, sessStart = null, sessEnd = null;

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const fmt = s => `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`;
const cleanId = raw => { const m = raw.match(/([a-f0-9]{32})/i); if (!m) return raw.trim(); const s = m[1]; return s.slice(0,8)+'-'+s.slice(8,12)+'-'+s.slice(12,16)+'-'+s.slice(16,20)+'-'+s.slice(20); };

async function api(method, path, body) {
  const res = await fetch(`/.netlify/functions/notion?path=${encodeURIComponent(path)}`, {
    method,
    headers: { 'Content-Type': 'application/json', 'x-notion-token': token },
    ...(body ? { body: JSON.stringify(body) } : {})
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || data.error || res.statusText);
  return data;
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function toast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.style.display = 'block';
  if (type === 'success') setTimeout(() => t.style.display = 'none', 4000);
}

async function connect() {
  token = $('token').value.trim();
  const rawP = $('input-projects-db').value.trim();
  const rawT = $('input-timetrack-db').value.trim();
  if (!token) { showErr('Pega tu token primero.'); return; }
  if (!rawP || !rawT) { showErr('Ingresa los IDs de ambas bases de datos.'); return; }
  PROJECTS_DB = cleanId(rawP);
  TIMETRACK_DB = cleanId(rawT);
  const btn = $('btn-connect');
  btn.disabled = true; btn.textContent = 'Conectando...';
  $('setup-error').style.display = 'none';
  try {
    const data = await api('POST', `/databases/${PROJECTS_DB}/query`, {
      filter: { and: [
        { property: 'Archivo', checkbox: { equals: false } },
        { property: 'Status', status: { does_not_equal: 'Off' } }
      ]},
      sorts: [{ property: 'Proyecto', direction: 'ascending' }],
      page_size: 50
    });
    projects = data.results.map(p => ({
      id: p.id,
      name: p.properties['Proyecto']?.title?.[0]?.plain_text || 'Sin nombre',
      acum: p.properties['⏱ Duración acum. (min)']?.number || 0
    }));
    const sel = $('project-select');
    sel.innerHTML = '<option value="">— Selecciona un proyecto —</option>' +
      projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    localStorage.setItem('notion_token', token);
    localStorage.setItem('projects_db', PROJECTS_DB);
    localStorage.setItem('timetrack_db', TIMETRACK_DB);
    show('screen-timer');
  } catch(e) {
    showErr('Error al conectar: ' + e.message + '. Revisa el token y los IDs.');
    btn.disabled = false; btn.textContent = 'Conectar y cargar proyectos';
  }
}

function showErr(msg) {
  const e = $('setup-error');
  e.textContent = msg; e.style.display = 'block';
}

function goSetup() { show('screen-setup'); }

function onProject() {
  const id = $('project-select').value;
  selected = projects.find(p => p.id === id) || null;
  $('project-card').style.display = selected ? 'block' : 'none';
  if (selected) {
    $('project-name').textContent = selected.name;
    $('acum').textContent = selected.acum + ' min';
  }
  $('btn-start').disabled = !selected;
}

function start() {
  if (!selected || interval) return;
  sessStart = new Date();
  startTs = Date.now() - elapsed * 1000;
  interval = setInterval(() => {
    elapsed = Math.floor((Date.now() - startTs) / 1000);
    $('timer').textContent = fmt(elapsed);
  }, 1000);
  $('timer').classList.add('running');
  $('dot').className = 'dot running';
  $('status-txt').textContent = 'Corriendo';
  $('btn-start').disabled = true;
  $('btn-stop').disabled = false;
  $('btn-save').disabled = true;
  $('project-select').disabled = true;
}

function stop() {
  if (!interval) return;
  clearInterval(interval); interval = null;
  sessEnd = new Date();
  $('timer').classList.remove('running');
  $('dot').className = 'dot done';
  $('status-txt').textContent = 'Detenido';
  $('btn-start').disabled = false;
  $('btn-stop').disabled = true;
  $('btn-save').disabled = false;
}

async function save() {
  if (!selected || !sessStart || !sessEnd) return;
  const btn = $('btn-save');
  btn.disabled = true; btn.textContent = 'Guardando...';
  const min = Math.round(elapsed / 60);
  const notes = $('notes').value.trim();
  const dateStr = sessStart.toLocaleDateString('es-CL', { day:'2-digit', month:'short' });
  try {
    await api('POST', '/pages', {
      parent: { database_id: TIMETRACK_DB },
      properties: {
        'Sesión': { title: [{ text: { content: `${selected.name} — ${dateStr}` } }] },
        'Proyecto (texto)': { rich_text: [{ text: { content: selected.name } }] },
        'Proyecto ID': { rich_text: [{ text: { content: selected.id } }] },
        'Duración (min)': { number: min },
        'date:Inicio:start': { date: { start: sessStart.toISOString() } },
        'date:Fin:start': { date: { start: sessEnd.toISOString() } },
        ...(notes ? { 'Notas': { rich_text: [{ text: { content: notes } }] } } : {})
      }
    });
    const newAcum = (selected.acum || 0) + min;
    await api('PATCH', `/pages/${selected.id}`, {
      properties: { '⏱ Duración acum. (min)': { number: newAcum } }
    });
    selected.acum = newAcum;
    $('acum').textContent = newAcum + ' min';
    toast(`✓ ${min} min guardados en "${selected.name}"`, 'success');
    $('notes').value = '';
    elapsed = 0; sessStart = null; sessEnd = null;
    $('timer').textContent = '00:00:00';
    $('dot').className = 'dot';
    $('status-txt').textContent = 'Listo';
    btn.textContent = 'Guardar en Notion →';
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'Guardar en Notion →';
  }
}

window.addEventListener('load', () => {
  const t = localStorage.getItem('notion_token');
  const p = localStorage.getItem('projects_db');
  const tt = localStorage.getItem('timetrack_db');
  if (t) $('token').value = t;
  if (p) $('input-projects-db').value = p;
  if (tt) $('input-timetrack-db').value = tt;
  if (t && p && tt) connect();
});
</script>
</body>
</html>
